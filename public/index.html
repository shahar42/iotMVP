<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Quote - Inspiration Every Day</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 300;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .quote-container {
            margin: 40px 0;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quote {
            font-size: 1.5rem;
            font-style: italic;
            line-height: 1.6;
            padding: 20px;
            border-left: 4px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .get-quote-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .get-quote-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .loading {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .container {
                margin: 20px;
                padding: 20px;
            }

            h1 {
                font-size: 2rem;
            }

            .quote {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Daily Quote</h1>
        <div class="quote-container">
            <div id="quote" class="quote">
                Click the button below to get your daily inspiration!
            </div>
        </div>
        <button id="getQuoteBtn" class="get-quote-btn">Get New Quote</button>
    </div>

    <script>
        const quoteElement = document.getElementById('quote');
        const btnElement = document.getElementById('getQuoteBtn');

        async function fetchQuote() {
            try {
                btnElement.textContent = 'Loading...';
                btnElement.classList.add('loading');
                btnElement.disabled = true;

                const response = await fetch('/api/quote');
                const data = await response.json();

                quoteElement.textContent = data.quote;

                setTimeout(() => {
                    btnElement.textContent = 'Get New Quote';
                    btnElement.classList.remove('loading');
                    btnElement.disabled = false;
                }, 500);

            } catch (error) {
                quoteElement.textContent = 'Sorry, couldn\'t fetch a quote right now. Please try again!';
                btnElement.textContent = 'Try Again';
                btnElement.classList.remove('loading');
                btnElement.disabled = false;
            }
        }

        btnElement.addEventListener('click', fetchQuote);

        // Load initial quote when page loads
        window.addEventListener('load', fetchQuote);
    </script>
</body>
</html>
